services:

  mysql:
    image: mysql:8.0
    container_name: todo-mysql
    networks:
      - todo-network
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tododb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: todo-app
    networks:
      - todo-network
    ports:
      - "9090:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: todo-mysql
      DB_NAME: tododb
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

networks:
  todo-network:
    driver: bridge

volumes:
  mysql_data: